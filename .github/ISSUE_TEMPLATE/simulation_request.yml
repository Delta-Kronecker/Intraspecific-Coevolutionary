name: Request new simulation
description: Request a new simulation run with custom parameters
title: "[SIMULATION] Request new simulation"
body:
  - type: input
    id: num_generations
    attributes:
      label: Number of Generations
      placeholder: "10000"
    validations:
      required: true

  - type: input
    id: total_pop
    attributes:
      label: Initial Population Size
      placeholder: "10000"
    validations:
      required: true

  - type: input
    id: save_interval
    attributes:
      label: Save Interval
      placeholder: "10"
    validations:
      required: true

  - type: input
    id: c0
    attributes:
      label: Base Fitness (C0)
      placeholder: "1"
    validations:
      required: true

  - type: input
    id: lambda_rate
    attributes:
      label: Overall Survival Rate (λ)
      placeholder: "0.5"
    validations:
      required: true

  - type: input
    id: loci_names
    attributes:
      label: Locus Names (comma-separated)
      placeholder: "A,B,C"
    validations:
      required: true

  - type: textarea
    id: loci_params
    attributes:
      label: Locus Parameters (JSON format)
      placeholder: |
        {
          "A": {"epsilon": 0.0001, "alpha": 0.001, "mu0": 1.0, "mutations": [[1, 1000]]},
          "B": {"epsilon": 0.0002, "alpha": 0.002, "mu0": 1.0, "mutations": [[1, 2000]]},
          "C": {"epsilon": 0.0002, "alpha": 0.003, "mu0": 1.0, "mutations": [[1, 3000]]}
        }
    validations:
      required: true

  - type: input
    id: decimal_precision
    attributes:
      label: Decimal Precision
      placeholder: "30"
      default: "30"

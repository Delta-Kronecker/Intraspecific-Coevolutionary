name: Run Evolutionary Simulation

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: write
  actions: write

jobs:
  run-simulation:
    if: contains(github.event.issue.labels.*.name, 'simulation-request')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy plotly matplotlib seaborn tqdm
      
      - name: Extract parameters from issue
        uses: actions/github-script@v7
        id: parse
        with:
          script: |
            const body = context.payload.issue.body;
            const jsonMatch = body.match(/```json\n([\s\S]*?)\n```/);
            
            if (jsonMatch) {
              const params = JSON.parse(jsonMatch[1]);
              const fs = require('fs');
              fs.writeFileSync('params.json', JSON.stringify(params, null, 2));
              console.log('✅ Parameters saved to params.json');
            } else {
              console.log('❌ No JSON block found in issue');
              process.exit(1);
            }
      
      - name: Run simulation
        run: |
          python simulation.py params.json
      
      - name: Generate plots
        run: |
          python plot_results.py || echo "Plot generation skipped"
      
      - name: Compress results
        run: |
          mkdir -p simulation_results
          cp results.csv simulation_results/ 2>/dev/null || true
          cp -r interactive_plots simulation_results/ 2>/dev/null || true
          cp -r static_plots simulation_results/ 2>/dev/null || true
          cd simulation_results && zip -r ../results.zip . && cd ..
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results
          path: results.zip
      
      - name: Post results to issue
        uses: actions/github-script@v7
        with:
          script: |
            const runId = process.env.GITHUB_RUN_ID;
            const repo = context.repo;
            const issueNumber = context.payload.issue.number;
            
            // Get artifact URL
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: repo.owner,
              repo: repo.repo,
              run_id: runId
            });
            
            const artifact = artifacts.data.artifacts.find(a => a.name === 'simulation-results');
            const downloadUrl = artifact ? `${repo.html_url}/actions/runs/${runId}/artifacts/${artifact.id}` : `${repo.html_url}/actions/runs/${runId}`;
            
            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: repo.owner,
              repo: repo.repo,
              body: `## ✅ Simulation Complete!\n\n### 📥 [Download Results](${downloadUrl})\n\n**Files included:**\n- \`results.csv\` - Raw simulation data\n- \`interactive_plots/\` - Interactive HTML plots\n- \`static_plots/\` - Static PNG images\n\n---\n🔗 Workflow run: ${runId}`
            });
            
            // Update labels
            await github.rest.issues.addLabels({
              issue_number: issueNumber,
              owner: repo.owner,
              repo: repo.repo,
              labels: ['simulation-completed']
            });
            
            try {
              await github.rest.issues.removeLabel({
                issue_number: issueNumber,
                owner: repo.owner,
                repo: repo.repo,
                name: 'pending'
              });
            } catch(e) {}

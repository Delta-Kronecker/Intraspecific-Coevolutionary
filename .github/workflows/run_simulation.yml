name: Run Evolutionary Simulation

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: write
  actions: write

jobs:
  run-simulation:
    if: contains(github.event.issue.title, '[SIMULATION]')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy plotly matplotlib seaborn tqdm
      
      - name: Get current date and time
        id: datetime
        run: |
          echo "TIMESTAMP=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "FOLDER_NAME=$(date +'%Y%m%d_%H%M%S')_simulation" >> $GITHUB_OUTPUT
      
      - name: Extract parameters from issue body
        uses: actions/github-script@v7
        id: parse
        with:
          script: |
            const body = context.payload.issue.body;
            
            const extractValue = (label) => {
              const lines = body.split('\n');
              for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes(label) && lines[i+1] && !lines[i+1].startsWith('#')) {
                  let value = lines[i+1].trim();
                  if (value && !value.startsWith('---')) return value;
                }
              }
              return null;
            };
            
            const jsonMatch = body.match(/```json\s*\n([\s\S]*?)\n```/);
            let lociParams = {};
            
            if (jsonMatch) {
              try {
                lociParams = JSON.parse(jsonMatch[1]);
                console.log('JSON parsed successfully');
              } catch(e) {
                console.log('Failed to parse JSON:', e);
              }
            } else {
              console.log('No JSON block found');
              const lociNames = extractValue('Locus Names (comma-separated)');
              if (lociNames) {
                const loci = lociNames.split(',').map(l => l.trim());
                for (const locus of loci) {
                  lociParams[locus] = {
                    epsilon: 0.0001,
                    alpha: 0.001,
                    mu0: 1.0,
                    mutations: []
                  };
                }
              }
            }
            
            const params = {
              num_generations: parseInt(extractValue('Number of Generations')) || 10000,
              total_pop: parseInt(extractValue('Initial Population Size')) || 10000,
              save_interval: parseInt(extractValue('Save Interval')) || 10,
              c0: parseFloat(extractValue('Base Fitness (C0)')) || 1.0,
              lambda_rate: parseFloat(extractValue('Overall Survival Rate (λ)')) || 0.5,
              loci_names: extractValue('Locus Names (comma-separated)') || 'A,B,C',
              decimal_precision: parseInt(extractValue('Decimal Precision')) || 30,
              loci_params: lociParams
            };
            
            const fs = require('fs');
            fs.writeFileSync('simulation_params.json', JSON.stringify(params, null, 2));
            
            console.log('Parameters saved to simulation_params.json');
      
      - name: Display parameters
        run: |
          echo "Simulation Parameters:"
          cat simulation_params.json
      
      - name: Run simulation
        run: |
          python simulation.py simulation_params.json
      
      - name: Generate plots
        run: |
          python plot_results.py || echo "Plot generation completed"
      
      - name: Create result folder with timestamp
        run: |
          FOLDER_NAME="${{ steps.datetime.outputs.FOLDER_NAME }}"
          mkdir -p "results/$FOLDER_NAME"
          mkdir -p "results/$FOLDER_NAME/data"
          mkdir -p "results/$FOLDER_NAME/plots/html"
          mkdir -p "results/$FOLDER_NAME/plots/png"
          
          echo "FOLDER_NAME=$FOLDER_NAME" >> $GITHUB_OUTPUT
          echo "RESULT_PATH=results/$FOLDER_NAME" >> $GITHUB_OUTPUT
      
      - name: Copy simulation results
        run: |
          RESULT_PATH="results/${{ steps.datetime.outputs.FOLDER_NAME }}"
          
          cp results.csv "$RESULT_PATH/data/" 2>/dev/null || echo "No results.csv"
          cp simulation_params.json "$RESULT_PATH/data/" 2>/dev/null || echo "No params file"
          
          cp -r interactive_plots/* "$RESULT_PATH/plots/html/" 2>/dev/null || echo "No HTML plots"
          cp -r static_plots/* "$RESULT_PATH/plots/png/" 2>/dev/null || echo "No PNG plots"
          
          echo "Files copied to $RESULT_PATH"
      
      - name: Create zip files
        run: |
          RESULT_PATH="results/${{ steps.datetime.outputs.FOLDER_NAME }}"
          
          cd "$RESULT_PATH"
          zip -r "../${{ steps.datetime.outputs.FOLDER_NAME }}_data.zip" data/
          zip -r "../${{ steps.datetime.outputs.FOLDER_NAME }}_html_plots.zip" plots/html/
          zip -r "../${{ steps.datetime.outputs.FOLDER_NAME }}_png_plots.zip" plots/png/
          zip -r "../${{ steps.datetime.outputs.FOLDER_NAME }}_all.zip" .
          cd ../..
          
          ls -lh results/*.zip
      
      - name: Commit results to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add results/
          git commit -m "Add simulation results from issue #${{ github.event.issue.number }} - ${{ steps.datetime.outputs.TIMESTAMP }}" || echo "No changes to commit"
          git push
      
      - name: Upload all results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: simulation-all-results
          path: results/simulation_results_*.zip
          retention-days: 7
      
      - name: Add comment with download links
        uses: actions/github-script@v7
        with:
          script: |
            const runId = process.env.GITHUB_RUN_ID;
            const repo = context.repo;
            const issueNumber = context.payload.issue.number;
            const timestamp = '${{ steps.datetime.outputs.TIMESTAMP }}';
            const folderName = '${{ steps.datetime.outputs.FOLDER_NAME }}';
            
            const fs = require('fs');
            let params = {};
            try {
              const paramsFile = fs.readFileSync('simulation_params.json', 'utf8');
              params = JSON.parse(paramsFile);
            } catch(e) {
              console.log('Could not read params file');
            }
            
            const repoUrl = `https://github.com/${repo.owner}/${repo.repo}`;
            const resultsFolderUrl = `${repoUrl}/tree/main/results/${folderName}`;
            const dataZipUrl = `${repoUrl}/raw/main/results/${folderName}_data.zip`;
            const htmlZipUrl = `${repoUrl}/raw/main/results/${folderName}_html_plots.zip`;
            const pngZipUrl = `${repoUrl}/raw/main/results/${folderName}_png_plots.zip`;
            const allZipUrl = `${repoUrl}/raw/main/results/${folderName}_all.zip`;
            
            const commentBody = '## Simulation Complete!\n\n' +
            '### Parameters Used:\n\n' +
            '| Parameter | Value |\n' +
            '|-----------|-------|\n' +
            '| Generations | ' + (params.num_generations || 'N/A') + ' |\n' +
            '| Population | ' + (params.total_pop || 'N/A') + ' |\n' +
            '| Loci | ' + (params.loci_names || 'N/A') + ' |\n' +
            '| Base Fitness (C0) | ' + (params.c0 || 'N/A') + ' |\n' +
            '| Survival Rate (λ) | ' + (params.lambda_rate || 'N/A') + ' |\n' +
            '| Save Interval | ' + (params.save_interval || 'N/A') + ' |\n\n' +
            '### Results Folder\n\n' +
            '📁 [View results folder on GitHub](' + resultsFolderUrl + ')\n\n' +
            '### Download Links\n\n' +
            '| File | Description |\n' +
            '|------|-------------|\n' +
            '| [📊 Download Data (CSV)](' + dataZipUrl + ') | Raw simulation data and parameters |\n' +
            '| [📈 Download HTML Plots](' + htmlZipUrl + ') | Interactive Plotly visualizations |\n' +
            '| [🖼️ Download PNG Plots](' + pngZipUrl + ') | Static matplotlib/seaborn images |\n' +
            '| [📦 Download All Results](' + allZipUrl + ') | Complete package |\n\n' +
            '### Contents:\n' +
            '- **data/results.csv** - Raw simulation data\n' +
            '- **data/simulation_params.json** - Parameters used\n' +
            '- **plots/html/** - Interactive HTML plots (Plotly)\n' +
            '- **plots/png/** - Static PNG images\n\n' +
            '### How to view:\n' +
            '1. Download and extract any zip file\n' +
            '2. Open HTML files in any browser for interactive plots\n' +
            '3. Check PNG files for static images\n\n' +
            '---\n' +
            '🕐 Execution time: ' + timestamp + '\n' +
            '🔗 Workflow run: ' + `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId}`;
            
            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: repo.owner,
              repo: repo.repo,
              body: commentBody
            });
            
            await github.rest.issues.addLabels({
              issue_number: issueNumber,
              owner: repo.owner,
              repo: repo.repo,
              labels: ['simulation-completed']
            });
      
      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            
            await github.rest.issues.update({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              state_reason: 'completed'
            });

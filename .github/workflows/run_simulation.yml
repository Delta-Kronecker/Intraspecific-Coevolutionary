name: Run Evolutionary Simulation

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: write
  actions: write

jobs:
  run-simulation:
    if: contains(github.event.issue.labels.*.name, 'simulation-request')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy plotly matplotlib seaborn tqdm
      
      - name: Parse parameters from issue
        uses: actions/github-script@v7
        id: parse
        with:
          script: |
            const body = context.payload.issue.body;
            
            // Extract JSON block from issue
            const jsonMatch = body.match(/```json\n([\s\S]*?)\n```/);
            let params = {};
            if (jsonMatch) {
              params = JSON.parse(jsonMatch[1]);
            }
            
            // Save params to file
            const fs = require('fs');
            fs.writeFileSync('params.json', JSON.stringify(params, null, 2));
            
            console.log('Params saved:', params);
      
      - name: Run simulation
        run: |
          # Pass params.json to simulation.py
          python simulation.py params.json
      
      - name: Generate plots
        run: |
          python plot_results.py
      
      - name: Compress results
        run: |
          zip -r results.zip results.csv interactive_plots/ static_plots/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results
          path: results.zip
      
      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const runId = process.env.GITHUB_RUN_ID;
            const repo = context.repo;
            const artifactUrl = `${repo.html_url}/actions/runs/${runId}`;
            
            await github.rest.issues.createComment({
              issue_number: context.payload.issue.number,
              owner: repo.owner,
              repo: repo.repo,
              body: `## ✅ Simulation Complete!\n\n📥 [Download Results](${artifactUrl})\n\nResults include: results.csv, interactive plots, and static plots.`
            });
